<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --bg-card: #f7f7f7;
      --text: #1a1a1a;
      --text-muted: #737373;
      --border: #e5e5e5;
      --green: #16a34a;
      --red: #dc2626;
    }
    body.dark {
      --bg: #111111;
      --bg-card: #1c1c1c;
      --text: #f0f0f0;
      --text-muted: #888888;
      --border: #2a2a2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      transition: background 0.15s, color 0.15s;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
    #darkToggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: border-color 0.15s, color 0.15s;
    }
    #darkToggle:hover { border-color: var(--text); color: var(--text); }

    /* ── Session Summary ── */
    .summary-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 32px;
    }
    .summary-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 16px;
    }
    .summary-heading {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .summary-updated { font-size: 12px; color: var(--text-muted); }
    .summary-table { width: 100%; border-collapse: collapse; }
    .summary-table tr { border-bottom: 1px solid var(--border); }
    .summary-table tr:last-child { border-bottom: none; }
    .summary-table td { padding: 10px 8px; vertical-align: middle; }
    .s-ticker { font-weight: 700; font-size: 15px; }
    .s-price { font-weight: 600; font-size: 16px; }
    .s-change { font-weight: 600; font-size: 14px; }
    .positive { color: var(--green); }
    .negative { color: var(--red); }
    .why-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 4px 11px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      transition: border-color 0.1s, color 0.1s;
    }
    .why-btn:hover { border-color: var(--text); color: var(--text); }

    /* ── Tab Bar ── */
    .tab-bar {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
      scrollbar-width: none;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      padding-top: 8px;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      padding: 8px 18px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
      transition: color 0.1s, border-color 0.1s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }

    /* ── Stock Section ── */
    .stock-section { margin-bottom: 56px; scroll-margin-top: 56px; }
    .stock-section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--text);
      margin-bottom: 28px;
    }
    .stock-section-header h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .stock-company { font-size: 15px; color: var(--text-muted); font-weight: 400; }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .badge-owned { background: var(--text); color: var(--bg); }
    .badge-watchlist { background: var(--border); color: var(--text-muted); }

    /* ── Subsection ── */
    .subsection { margin-bottom: 28px; }
    .subsection-title {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      padding-bottom: 7px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Quote Grid ── */
    .quote-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
    }
    .quote-item .q-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .quote-item .q-value { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }

    /* ── Chart ── */
    .chart-controls { display: flex; gap: 6px; margin-bottom: 14px; }
    .tf-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 4px 13px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .tf-btn:hover { border-color: var(--text); color: var(--text); }
    .tf-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    .chart-wrap { position: relative; height: 200px; }

    /* ── Sentiment ── */
    .sentiment-rows { display: flex; flex-direction: column; gap: 14px; }
    .sentiment-row { display: flex; align-items: center; gap: 14px; }
    .s-label { width: 88px; font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
    .s-bar-track { flex: 1; height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .s-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .bar-positive { background: var(--green); }
    .bar-negative { background: var(--red); }
    .bar-neutral { background: #9ca3af; }
    .s-val { font-size: 12px; font-weight: 600; width: 76px; text-align: right; flex-shrink: 0; }
    .analyst-counts { display: flex; gap: 24px; align-items: baseline; margin-top: 4px; flex-wrap: wrap; }
    .analyst-count .ac-num { font-size: 22px; font-weight: 800; }
    .analyst-count .ac-lbl { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .analyst-meta { font-size: 13px; color: var(--text-muted); margin-left: auto; }
    .inst-row { display: flex; align-items: center; gap: 14px; margin-top: 4px; }

    /* ── P&L ── */
    .pnl-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 22px;
      display: flex;
      gap: 36px;
      flex-wrap: wrap;
    }
    .pnl-item .p-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .pnl-item .p-value { font-size: 20px; font-weight: 800; letter-spacing: -0.4px; }

    /* ── News ── */
    .news-list { display: flex; flex-direction: column; gap: 0; }
    .news-item {
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .news-item:first-child { padding-top: 0; }
    .news-item:last-child { border-bottom: none; }
    .news-title { font-weight: 600; font-size: 14px; margin-bottom: 3px; line-height: 1.4; }
    .news-title a { color: var(--text); text-decoration: none; }
    .news-title a:hover { text-decoration: underline; }
    .news-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .news-summary { font-size: 13px; color: var(--text-muted); line-height: 1.55; }

    /* ── Sector ── */
    .sector-rows { display: flex; flex-direction: column; gap: 10px; }
    .sector-row { display: flex; gap: 10px; }
    .sr-label { font-size: 12px; color: var(--text-muted); width: 88px; flex-shrink: 0; padding-top: 1px; }
    .sr-value { font-size: 13px; line-height: 1.5; }
    .sector-news { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
    .sector-news-item { font-size: 12px; color: var(--text-muted); padding-left: 12px; border-left: 2px solid var(--border); line-height: 1.4; }

    /* ── Forecasts ── */
    .forecast-list { display: flex; flex-direction: column; gap: 16px; }
    .forecast-block .fc-period { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 5px; }
    .forecast-block .fc-text { font-size: 13px; line-height: 1.6; }
    .valuation-row {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .val-item .v-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
    .val-item .v-value { font-size: 17px; font-weight: 700; }

    /* ── Why Did It Move ── */
    .movement-periods { display: flex; flex-direction: column; gap: 24px; }
    .movement-period .mp-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 7px;
    }
    .movement-period .mp-explanation { font-size: 13px; line-height: 1.65; margin-bottom: 10px; }
    .movement-articles { display: flex; flex-direction: column; gap: 7px; }
    .movement-article {
      font-size: 12px;
      color: var(--text-muted);
      padding-left: 12px;
      border-left: 2px solid var(--border);
      line-height: 1.4;
    }

    /* ── Loading / Error ── */
    .state-msg { text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 15px; }
    .state-msg.error { color: var(--red); }

    /* ── Mobile ── */
    @media (max-width: 580px) {
      .container { padding: 0 16px 60px; }
      .quote-grid { grid-template-columns: repeat(3, 1fr); }
      .pnl-card { gap: 20px; }
      .valuation-row { gap: 16px; }
      .analyst-counts { gap: 16px; }
      .summary-table .s-change { font-size: 13px; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>My Portfolio</h1>
    <button id="darkToggle" onclick="toggleDark()">Dark Mode</button>
  </header>
  <div id="app"><div class="state-msg">Loading portfolio data…</div></div>
</div>

<script>
// Chart registry: ticker → { chart, allDates, allPrices }
const _charts = {};

// ── Dark mode ──────────────────────────────────────────────────
function toggleDark() {
  const dark = document.body.classList.toggle('dark');
  document.getElementById('darkToggle').textContent = dark ? 'Light Mode' : 'Dark Mode';
  Object.values(_charts).forEach(({ chart }) => _updateChartTheme(chart));
}

function _updateChartTheme(chart) {
  const dark = document.body.classList.contains('dark');
  const line = dark ? '#d4d4d4' : '#1a1a1a';
  const fill = dark ? 'rgba(212,212,212,0.07)' : 'rgba(26,26,26,0.05)';
  const grid = dark ? '#2a2a2a' : '#f0f0f0';
  const tick = dark ? '#888' : '#9a9a9a';
  chart.data.datasets[0].borderColor = line;
  chart.data.datasets[0].backgroundColor = fill;
  chart.options.scales.x.ticks.color = tick;
  chart.options.scales.y.ticks.color = tick;
  chart.options.scales.x.grid.color = grid;
  chart.options.scales.y.grid.color = grid;
  chart.update('none');
}

// ── Formatting ──────────────────────────────────────────────────
function fmt(n, d = 2) {
  if (n == null || n === '') return '—';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function fmtVol(n) {
  if (!n) return '—';
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(0) + 'K';
  return String(n);
}
function fmtCap(n) {
  if (!n) return '—';
  if (typeof n === 'string') return n;
  if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(0) + 'M';
  return '$' + n.toLocaleString();
}
function sign(v) { return v > 0 ? '+' : ''; }
function cls(v) { return v > 0 ? 'positive' : v < 0 ? 'negative' : ''; }
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Scroll helpers ──────────────────────────────────────────────
function scrollToMovement(ticker) {
  document.getElementById('movement-' + ticker)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function scrollToStock(ticker) {
  document.getElementById('stock-' + ticker)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Session Summary ─────────────────────────────────────────────
function buildSummary(data) {
  const ts = data.updated_at
    ? new Date(data.updated_at).toLocaleString('en-ZA', { weekday: 'short', day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })
    : 'Unknown';

  const rows = (data.session_summary || []).map(s => {
    const cp = s.change_pct || 0;
    const ca = s.change_abs || 0;
    return `<tr>
      <td><span class="s-ticker">${esc(s.ticker)}</span></td>
      <td><span class="s-price">$${fmt(s.close)}</span></td>
      <td><span class="s-change ${cls(cp)}">${sign(cp)}${fmt(cp)}%&nbsp;&nbsp;${sign(ca)}$${fmt(Math.abs(ca))}</span></td>
      <td style="text-align:right"><button class="why-btn" onclick="scrollToMovement('${esc(s.ticker)}')">→ Why?</button></td>
    </tr>`;
  }).join('');

  return `<div class="summary-panel">
    <div class="summary-header">
      <span class="summary-heading">Session Summary</span>
      <span class="summary-updated">Updated: ${esc(ts)}</span>
    </div>
    <table class="summary-table"><tbody>${rows}</tbody></table>
  </div>`;
}

// ── Tab Bar ─────────────────────────────────────────────────────
function buildTabs(tickers) {
  const btns = tickers.map((t, i) =>
    `<button class="tab-btn${i === 0 ? ' active' : ''}" id="tab-${t}" onclick="scrollToStock('${esc(t)}')">${esc(t)}</button>`
  ).join('');
  return `<div class="tab-bar" id="tabBar">${btns}</div>`;
}

function setupScrollSpy(tickers) {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const t = e.target.id.replace('stock-', '');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + t)?.classList.add('active');
      }
    });
  }, { threshold: 0.05, rootMargin: '-60px 0px -70% 0px' });
  tickers.forEach(t => {
    const el = document.getElementById('stock-' + t);
    if (el) obs.observe(el);
  });
}

// ── Per-Stock Section ───────────────────────────────────────────
function buildStock(ticker, s) {
  const owned = s.type === 'owned';
  const badge = owned
    ? '<span class="badge badge-owned">Owned</span>'
    : '<span class="badge badge-watchlist">Watchlist</span>';

  const q = s.quote || {};
  const dayChange = (q.close || 0) - (q.open || 0);

  // Quote
  const quoteHtml = `<div class="subsection">
    <div class="subsection-title">Quote</div>
    <div class="quote-grid">
      <div class="quote-item"><div class="q-label">Open</div><div class="q-value">$${fmt(q.open)}</div></div>
      <div class="quote-item"><div class="q-label">Close</div><div class="q-value ${cls(dayChange)}">$${fmt(q.close)}</div></div>
      <div class="quote-item"><div class="q-label">High</div><div class="q-value">$${fmt(q.high)}</div></div>
      <div class="quote-item"><div class="q-label">Low</div><div class="q-value">$${fmt(q.low)}</div></div>
      <div class="quote-item"><div class="q-label">Volume</div><div class="q-value">${fmtVol(q.volume)}</div></div>
    </div>
  </div>`;

  // Chart
  const hasChart = s.chart && Array.isArray(s.chart.dates) && s.chart.dates.length > 1;
  const chartHtml = hasChart ? `<div class="subsection">
    <div class="subsection-title">Price Chart</div>
    <div class="chart-controls">
      <button class="tf-btn" id="tf-${ticker}-2" onclick="setTF('${ticker}',2)">1D</button>
      <button class="tf-btn" id="tf-${ticker}-5" onclick="setTF('${ticker}',5)">1W</button>
      <button class="tf-btn" id="tf-${ticker}-21" onclick="setTF('${ticker}',21)">1M</button>
      <button class="tf-btn active" id="tf-${ticker}-0" onclick="setTF('${ticker}',0)">3M</button>
    </div>
    <div class="chart-wrap"><canvas id="chart-${ticker}"></canvas></div>
  </div>` : '';

  // Sentiment
  const sent = s.sentiment || {};
  const pub = sent.public || {};
  const anl = sent.analysts || {};
  const inst = sent.institutional || {};
  const score = pub.score || 0;
  const barW = Math.round(Math.min(100, Math.max(0, (score + 100) / 2)));
  const barCls = score >= 20 ? 'bar-positive' : score <= -20 ? 'bar-negative' : 'bar-neutral';
  const totalAnl = (anl.buy || 0) + (anl.hold || 0) + (anl.sell || 0);

  const sentHtml = `<div class="subsection">
    <div class="subsection-title">Sentiment</div>
    <div class="sentiment-rows">
      <div class="sentiment-row">
        <span class="s-label">Public</span>
        <div class="s-bar-track"><div class="s-bar ${barCls}" style="width:${barW}%"></div></div>
        <span class="s-val ${cls(score)}">${esc(pub.label || (score > 20 ? 'Positive' : score < -20 ? 'Negative' : 'Neutral'))}</span>
      </div>
      ${totalAnl > 0 ? `
      <div>
        <div class="analyst-counts">
          <div class="analyst-count"><div class="ac-num positive">${anl.buy || 0}</div><div class="ac-lbl">Buy</div></div>
          <div class="analyst-count"><div class="ac-num" style="color:var(--text-muted)">${anl.hold || 0}</div><div class="ac-lbl">Hold</div></div>
          <div class="analyst-count"><div class="ac-num negative">${anl.sell || 0}</div><div class="ac-lbl">Sell</div></div>
          ${anl.consensus ? `<div class="analyst-meta">Consensus: <strong>${esc(anl.consensus)}</strong>${anl.target ? `&ensp;·&ensp;Target: <strong>$${fmt(anl.target)}</strong>` : ''}</div>` : ''}
        </div>
      </div>` : ''}
      ${inst.trend ? `
      <div class="inst-row">
        <span class="s-label">Institutional</span>
        <span style="font-size:13px">${esc(inst.trend)}${inst.period ? `&ensp;<span style="color:var(--text-muted);font-size:12px">${esc(inst.period)}</span>` : ''}</span>
      </div>` : ''}
    </div>
  </div>`;

  // P&L (owned only)
  const pos = s.position || {};
  const currentVal = (pos.qty || 0) * (q.close || 0);
  const pnlHtml = owned && pos.avg_cost ? `<div class="subsection">
    <div class="subsection-title">Your Position</div>
    <div class="pnl-card">
      <div class="pnl-item"><div class="p-label">Shares</div><div class="p-value">${pos.qty || '—'}</div></div>
      <div class="pnl-item"><div class="p-label">Avg Cost</div><div class="p-value">$${fmt(pos.avg_cost)}</div></div>
      <div class="pnl-item"><div class="p-label">Current Value</div><div class="p-value">$${fmt(currentVal)}</div></div>
      <div class="pnl-item"><div class="p-label">P&amp;L</div><div class="p-value ${cls(pos.pnl_abs)}">${sign(pos.pnl_abs)}$${fmt(Math.abs(pos.pnl_abs))}&ensp;<span style="font-size:14px;font-weight:600">(${sign(pos.pnl_pct)}${fmt(pos.pnl_pct)}%)</span></div></div>
    </div>
  </div>` : '';

  // News
  const newsItems = (s.news || []).map(n => `<div class="news-item">
    <div class="news-title"><a href="${esc(n.url || '#')}" target="_blank" rel="noopener">${esc(n.title)}</a></div>
    <div class="news-meta">${esc(n.publisher || '')}${n.date ? '&ensp;·&ensp;' + esc(n.date) : ''}</div>
    ${n.summary ? `<div class="news-summary">${esc(n.summary)}</div>` : ''}
  </div>`).join('');
  const newsHtml = newsItems ? `<div class="subsection">
    <div class="subsection-title">Latest News</div>
    <div class="news-list">${newsItems}</div>
  </div>` : '';

  // Sector
  const sec = s.sector_info || {};
  const secNewsHtml = (sec.news || []).slice(0, 3).map(n =>
    `<div class="sector-news-item">${esc(n.title || '')}${n.publisher ? '&ensp;—&ensp;' + esc(n.publisher) : ''}</div>`
  ).join('');
  const sectorHtml = (sec.sentiment || sec.forecast || secNewsHtml) ? `<div class="subsection">
    <div class="subsection-title">Sector: ${esc(s.sector || 'Unknown')}</div>
    <div class="sector-rows">
      ${sec.sentiment ? `<div class="sector-row"><span class="sr-label">Sentiment</span><span class="sr-value">${esc(sec.sentiment)}</span></div>` : ''}
      ${sec.forecast ? `<div class="sector-row"><span class="sr-label">Forecast</span><span class="sr-value">${esc(sec.forecast)}</span></div>` : ''}
    </div>
    ${secNewsHtml ? `<div class="sector-news">${secNewsHtml}</div>` : ''}
  </div>` : '';

  // Forecasts
  const fc = s.forecasts || {};
  const val = fc.valuation || {};
  const valRow = (val.pe != null || val.pb != null || val.peg != null || val.market_cap) ? `
    <div class="valuation-row">
      ${val.pe != null ? `<div class="val-item"><div class="v-label">P/E</div><div class="v-value">${fmt(val.pe, 1)}</div></div>` : ''}
      ${val.pb != null ? `<div class="val-item"><div class="v-label">P/B</div><div class="v-value">${fmt(val.pb, 1)}</div></div>` : ''}
      ${val.peg != null ? `<div class="val-item"><div class="v-label">PEG</div><div class="v-value">${fmt(val.peg, 1)}</div></div>` : ''}
      ${val.market_cap ? `<div class="val-item"><div class="v-label">Market Cap</div><div class="v-value">${fmtCap(val.market_cap)}</div></div>` : ''}
    </div>` : '';
  const forecastHtml = (fc.short_term || fc.long_term || valRow) ? `<div class="subsection">
    <div class="subsection-title">Forecasts</div>
    <div class="forecast-list">
      ${fc.short_term ? `<div class="forecast-block"><div class="fc-period">Short-term (4 weeks)</div><div class="fc-text">${esc(fc.short_term)}</div></div>` : ''}
      ${fc.long_term ? `<div class="forecast-block"><div class="fc-period">Long-term (12 months)</div><div class="fc-text">${esc(fc.long_term)}</div></div>` : ''}
    </div>
    ${valRow}
  </div>` : '';

  // Why Did It Move
  const mov = s.movement || {};
  function movPeriod(period, label) {
    if (!period) return '';
    const cp = period.change_pct;
    const arts = (period.articles || []).map(a =>
      `<div class="movement-article">${esc(a.title || '')}${a.publisher ? '&ensp;—&ensp;' + esc(a.publisher) : ''}</div>`
    ).join('');
    return `<div class="movement-period">
      <div class="mp-title">${label}${cp != null ? ` <span style="font-weight:400">(${sign(cp)}${fmt(cp)}%)</span>` : ''}</div>
      <div class="mp-explanation">${esc(period.explanation || '—')}</div>
      ${arts ? `<div class="movement-articles">${arts}</div>` : ''}
    </div>`;
  }
  const whyHtml = `<div class="subsection" id="movement-${ticker}" style="scroll-margin-top:60px">
    <div class="subsection-title">Why Did It Move?</div>
    <div class="movement-periods">
      ${movPeriod(mov.session, 'Yesterday')}
      ${movPeriod(mov.week, 'Last Week')}
      ${!mov.session && !mov.week ? '<div style="color:var(--text-muted);font-size:13px">Movement analysis will appear after the first routine run.</div>' : ''}
    </div>
  </div>`;

  return `<div class="stock-section" id="stock-${ticker}">
    <div class="stock-section-header">
      <h2>${esc(ticker)}</h2>
      ${s.name ? `<span class="stock-company">${esc(s.name)}</span>` : ''}
      ${badge}
    </div>
    ${quoteHtml}
    ${chartHtml}
    ${sentHtml}
    ${pnlHtml}
    ${newsHtml}
    ${sectorHtml}
    ${forecastHtml}
    ${whyHtml}
  </div>`;
}

// ── Chart.js init ───────────────────────────────────────────────
function initChart(ticker, chartData) {
  const canvas = document.getElementById('chart-' + ticker);
  if (!canvas || !chartData?.dates?.length) return;
  const dark = document.body.classList.contains('dark');
  const line = dark ? '#d4d4d4' : '#1a1a1a';
  const fill = dark ? 'rgba(212,212,212,0.07)' : 'rgba(26,26,26,0.05)';
  const grid = dark ? '#2a2a2a' : '#f0f0f0';
  const tick = dark ? '#888' : '#9a9a9a';

  const chart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: chartData.dates,
      datasets: [{
        data: chartData.prices,
        borderColor: line,
        backgroundColor: fill,
        borderWidth: 1.5,
        pointRadius: 0,
        fill: true,
        tension: 0.15
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index',
          intersect: false,
          callbacks: { label: ctx => '$' + fmt(ctx.parsed.y) }
        }
      },
      scales: {
        x: {
          ticks: { color: tick, maxTicksLimit: 5, maxRotation: 0 },
          grid: { color: grid },
          border: { display: false }
        },
        y: {
          position: 'right',
          ticks: { color: tick, callback: v => '$' + fmt(v, 0) },
          grid: { color: grid },
          border: { display: false }
        }
      },
      interaction: { mode: 'index', intersect: false }
    }
  });

  _charts[ticker] = { chart, allDates: chartData.dates, allPrices: chartData.prices };
}

function setTF(ticker, n) {
  const entry = _charts[ticker];
  if (!entry) return;
  const { chart, allDates, allPrices } = entry;
  const dates  = n === 0 ? allDates  : allDates.slice(-n);
  const prices = n === 0 ? allPrices : allPrices.slice(-n);
  chart.data.labels = dates;
  chart.data.datasets[0].data = prices;
  chart.update();
  document.querySelectorAll(`[id^="tf-${ticker}-"]`).forEach(b => b.classList.remove('active'));
  document.getElementById(`tf-${ticker}-${n}`)?.classList.add('active');
}

// ── Bootstrap ───────────────────────────────────────────────────
async function init() {
  const app = document.getElementById('app');
  try {
    const res = await fetch('data/data.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    const tickers = Object.keys(data.stocks || {});
    if (!tickers.length) throw new Error('No stock data found in data.json');

    let html = buildSummary(data) + buildTabs(tickers);
    tickers.forEach(t => { html += buildStock(t, data.stocks[t]); });
    app.innerHTML = html;

    tickers.forEach(t => {
      if (data.stocks[t].chart) initChart(t, data.stocks[t].chart);
    });
    setupScrollSpy(tickers);
  } catch (e) {
    app.innerHTML = `<div class="state-msg error">
      Could not load portfolio data.<br>
      <small style="font-size:12px;opacity:0.7">${esc(e.message)}</small>
    </div>`;
  }
}

init();
</script>
